# PineVC-PR Docker Compose
# Dify (内容生成) + n8n (调度集成)
# 版本: v1.0

services:
  # ===========================================
  # Dify 服务组 - 内容生成引擎
  # ===========================================

  # Dify 数据库迁移 (必须首先运行)
  dify-db-migrate:
    image: langgenius/dify-api:latest
    container_name: pinevc-dify-migrate
    environment:
      - MODE=migration
      - LOG_LEVEL=INFO
      - SECRET_KEY=${DIFY_SECRET_KEY:-dify-secret-key-change-in-production}
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-dify123456}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dify123456}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pinevc-network
    restart: "no"

  # Dify API 服务
  dify-api:
    image: langgenius/dify-api:latest
    container_name: pinevc-dify-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - MODE=api
      - LOG_LEVEL=INFO
      - SECRET_KEY=${DIFY_SECRET_KEY:-dify-secret-key-change-in-production}
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-dify123456}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dify123456}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-dify123456}@redis:6379/1
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/storage
      - VECTOR_STORE=weaviate
      - WEAVIATE_ENDPOINT=http://weaviate:8080
      - WEAVIATE_API_KEY=${WEAVIATE_API_KEY:-}
      # OpenAI 配置 (可选)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Anthropic 配置 (可选)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # 智谱 AI 配置 (GLM 系列)
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY:-}
    volumes:
      - dify-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
    networks:
      - pinevc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dify Worker 服务 (后台任务)
  dify-worker:
    image: langgenius/dify-api:latest
    container_name: pinevc-dify-worker
    restart: unless-stopped
    environment:
      - MODE=worker
      - LOG_LEVEL=INFO
      - SECRET_KEY=${DIFY_SECRET_KEY:-dify-secret-key-change-in-production}
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-dify123456}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dify123456}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-dify123456}@redis:6379/1
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/storage
      - VECTOR_STORE=weaviate
      - WEAVIATE_ENDPOINT=http://weaviate:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY:-}
    volumes:
      - dify-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pinevc-network

  # Dify Web 前端
  dify-web:
    image: langgenius/dify-web:latest
    container_name: pinevc-dify-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CONSOLE_API_URL=http://localhost:5001
      - APP_API_URL=http://localhost:5001
    depends_on:
      - dify-api
    networks:
      - pinevc-network

  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: pinevc-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-dify123456}
      - POSTGRES_DB=dify
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pinevc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dify"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: pinevc-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-dify123456}
    volumes:
      - redis-data:/data
    networks:
      - pinevc-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dify123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Weaviate 向量数据库
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: pinevc-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate-data:/var/lib/weaviate
    networks:
      - pinevc-network

  # ===========================================
  # n8n 服务 - 调度集成引擎
  # ===========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: pinevc-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      # 基础认证 (可选)
      - N8N_BASIC_AUTH_ACTIVE=${N8N_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_AUTH_PASSWORD:-admin123}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - pinevc-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===========================================
# 网络配置
# ===========================================
networks:
  pinevc-network:
    driver: bridge
    name: pinevc-network

# ===========================================
# 数据卷
# ===========================================
volumes:
  postgres-data:
    name: pinevc-postgres-data
  redis-data:
    name: pinevc-redis-data
  weaviate-data:
    name: pinevc-weaviate-data
  dify-storage:
    name: pinevc-dify-storage
  n8n-data:
    name: pinevc-n8n-data
